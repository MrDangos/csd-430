<!DOCTYPE html>
<!--
Author: Hugo Ramirez 
Project: JSP Job Application Form
File: job_application.html
Date: 04/05/2026
Description: Job application form. Collects applicant personal info,
    position details, availability, experience, and a short
    personal statement. Submits to job_results.jsp for display.
-->
<html>
<head>
    <title>Job Application Form</title>
    <link rel="stylesheet" type="text/css" href="style.css">
</head>
<body>

    <h1>Job Application Form</h1>
    <p>Please fill out all sections below and click Submit when you are done.</p>

    <form action="job_results.jsp" method="get">

        <h2>Personal Information</h2>

        <!-- Text input: First name -->
        <label for="firstName">First Name:</label>
        <input type="text" id="firstName" name="firstName">

        <!-- Text input: Last name -->
        <label for="lastName">Last Name:</label>
        <input type="text" id="lastName" name="lastName">

        <!-- Text input: Phone number -->
        <label for="phone">Phone Number:</label>
        <input type="text" id="phone" name="phone" placeholder="e.g. 555-867-5309">

        <!-- Text input: Email address -->
        <label for="email">Email Address:</label>
        <input type="text" id="email" name="email" placeholder="e.g. jane@email.com">

        <!-- Text input: City and state -->
        <label for="location">City, State:</label>
        <input type="text" id="location" name="location" placeholder="e.g. Des Moines, IA">


        <h2>Position Details</h2>

        <!-- Select dropdown: Position applying for -->
        <label for="position">Position Applying For:</label>
        <select id="position" name="position">
            <option value="">-- Select One --</option>
            <option value="Cashier">Cashier</option>
            <option value="Warehouse Associate">Warehouse Associate</option>
            <option value="Customer Service">Customer Service</option>
            <option value="Sales Associate">Sales Associate</option>
            <option value="Manager">Manager</option>
            <option value="Other">Other</option>
        </select>

        <!-- Select dropdown: Employment type -->
        <label for="empType">Employment Type:</label>
        <select id="empType" name="empType">
            <option value="">-- Select One --</option>
            <option value="Full-Time">Full-Time</option>
            <option value="Part-Time">Part-Time</option>
            <option value="Seasonal">Seasonal</option>
        </select>

        <!-- Date input: Available start date -->
        <label for="startDate">Available Start Date:</label>
        <input type="date" id="startDate" name="startDate">


        <h2>Availability</h2>

        <!-- Checkboxes: Days available to work -->
        <label>Days Available: (Check all that apply)</label>
        <input type="checkbox" name="days" value="Monday"> Monday<br>
        <input type="checkbox" name="days" value="Tuesday"> Tuesday<br>
        <input type="checkbox" name="days" value="Wednesday"> Wednesday<br>
        <input type="checkbox" name="days" value="Thursday"> Thursday<br>
        <input type="checkbox" name="days" value="Friday"> Friday<br>
        <input type="checkbox" name="days" value="Saturday"> Saturday<br>
        <input type="checkbox" name="days" value="Sunday"> Sunday<br>


        <h2>Experience and Background</h2>

        <!-- Number input: Years of experience -->
        <label for="yearsExp">Years of Work Experience:</label>
        <input type="number" id="yearsExp" name="yearsExp" min="0" max="50">

        <!-- Radio buttons: Has a high school diploma or GED -->
        <label>Do you have a high school diploma or GED?</label>
        <input type="radio" name="diploma" value="Yes"> Yes
        <input type="radio" name="diploma" value="No"> No

        <!-- Select dropdown: Highest education level -->
        <label for="education">Highest Education Level:</label>
        <select id="education" name="education">
            <option value="">-- Select One --</option>
            <option value="High School / GED">High School / GED</option>
            <option value="Some College">Some College</option>
            <option value="Associate Degree">Associate Degree</option>
            <option value="Bachelor's Degree">Bachelor's Degree</option>
            <option value="Master's or Higher">Master's or Higher</option>
        </select>

        <!-- Textarea: Personal statement -->
        <label for="statement">Why do you want to work here?</label>
        <textarea id="statement" name="statement" rows="5" cols="40"></textarea>

        <br>
        <input type="submit" value="Submit Application">

    </form>

</body>
</html>
